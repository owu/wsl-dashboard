donation_purpose = "ಈ ಸಾಧನವು ನಿಜವಾಗಿಯೂ ನಿಮಗೆ ಸಹಾಯ ಮಾಡಿದ್ದರೆ, ಕೈ ನೀಡಲು ಪರಿಗಣಿಸಿ. ಎಲ್ಲಾ ದೇಣಿಗೆಗಳು ಸರ್ವರ್ ವೆಚ್ಚ, ಆವೃತ್ತಿ ಪುನರಾವರ್ತನೆ ಮತ್ತು ವೈಶಿಷ್ಟ್ಯ ಸುಧಾರಣೆಗಳಿಗೆ ಹೋಗುತ್ತವೆ."
