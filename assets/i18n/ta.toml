[donate]
title = "இந்தத் திட்டத்தை ஆதரியுங்கள்"
license_intro = "இந்தத் திட்டம் GPL-3.0 உரிமத்தின் கீழ் அனைத்து பயனர்களுக்கும் இலவசமாக உள்ளது."
maintain_note = "அம்ச மேம்பாடு, தினசரி சோதனை முதல் பிழை திருத்தம் வரை, அனைத்து வேலைகளும் ஓய்வு நேரத்தில் செய்யப்படுகின்றன. திறந்த மூலத்தின் பாதை தனியாக எளிதல்ல — உங்கள் அங்கீகாரமும் ஆதரவும் திட்டத்திற்கு தொடர்ந்து செல்ல நம்பிக்கை அளிக்கின்றன."
donation_purpose = "இந்த கருவி உங்களுக்கு உண்மையிலேயே உதவியிருந்தால், உதவிக்கரம் நீட்டுங்கள். அனைத்து நன்கொடைகளும் சேவையக செலவுகள், பதிப்பு மேம்பாடுகள் மற்றும் அம்ச மேம்பாடுகளுக்கு பயன்படுத்தப்படும், திட்டம் தொடர்ந்து புதுப்பிக்கப்பட்டு நிலையான முன்னேற்றத்தை உறுதிசெய்யும்."
